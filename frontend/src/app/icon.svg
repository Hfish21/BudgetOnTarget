<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Background rounded square -->
  <rect width="40" height="40" rx="8" fill="#10B981"/>
  <!-- Ledger lines -->
  <line x1="8" y1="14" x2="32" y2="14" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="20" x2="32" y2="20" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="26" x2="32" y2="26" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="32" x2="32" y2="32" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Trend line going up -->
  <polyline points="10,30 16,24 22,26 28,16 32,10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Dot at the peak -->
  <circle cx="32" cy="10" r="2.5" fill="white"/>
</svg>
