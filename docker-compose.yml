services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - bot-data:/data
    environment:
      - BOT_DATABASE_URL=sqlite:////data/budgetontarget.db
      - BOT_CORS_ORIGINS=["http://localhost:3000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  bot-data:
